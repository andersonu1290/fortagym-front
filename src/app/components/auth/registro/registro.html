<div class="registro-container">
    <div class="card-registro">
        <h2>Únete a FortaGym</h2>
        <p>Crea tu cuenta para empezar tu transformación.</p>

        <div *ngIf="mensajeError" class="alert-error">{{ mensajeError }}</div>

        <form (ngSubmit)="onSubmit()" #regForm="ngForm">
            <div class="form-group">
                <label>DNI</label>
                <input type="text" name="dni" [(ngModel)]="usuario.dni" required maxlength="8">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="nombre" [(ngModel)]="usuario.nombre" required>
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" name="apellido" [(ngModel)]="usuario.apellido" required>
                </div>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" [(ngModel)]="usuario.email" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" [(ngModel)]="usuario.password" required>
            </div>

            <button type="submit" [disabled]="!regForm.form.valid" class="btn-registrar">
                Registrarse
            </button>
        </form>

        <p class="footer-link">
            ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
        </p>
    </div>
</div>
